<div *ngIf="createRevision > 0">
    Create Revision: <p-badge severity="info" [value]="createRevision"></p-badge>
    Latest Version: <p-badge severity="info" [value]="currentVersion"></p-badge>
</div>
<p-table #dt1 [value]="versions" dataKey="key" [rows]="10" [loading]="loading" [rowHover]="true"
    styleClass="p-datatable-gridlines" [paginator]="true" sortField="version" [sortOrder]="1"
    [globalFilterFields]="['value', 'modRevision','version']" responsiveLayout="scroll">
    <ng-template pTemplate="caption">
        <div class="flex justify-content-between flex-column sm:flex-row">
            <span class="p-input-icon-left mb-2">
                <i aria-hidden="true" class="pi pi-search"></i>
                <input pInputText type="text" #filter (input)="dt1.filterGlobal($event.target.value, 'contains')"
                    placeholder="Search Keyword" class="w-full" />
            </span>
        </div>
    </ng-template>
    <ng-template pTemplate="header">
        <tr>
            <th scope="col">
                <div class="flex justify-content-between align-items-center">
                    Modify Revision
                </div>
            </th>
            <th scope="col">
                <div class="flex justify-content-between align-items-center">
                    Version
                </div>
            </th>
            <th scope="col">
                <div class="flex justify-content-between align-items-center">
                    Value
                </div>
            </th>
            <th scope="col">
                Action
            </th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item>
        <tr>
            <td>{{item.modRevision}}</td>
            <td>{{item.version}}</td>
            <td>{{item.value}}</td>
            <td>
                <button pButton aria-label="button" type="button" icon="fas fa-code-compare"
                    pTooltip="Compare current version with latest" tooltipPosition="top"
                    class="p-button-rounded p-button-text p-button-icon-only" (click)="compareVersion(item)"></button>
            </td>
        </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
        <tr>
            <td colspan="7">No revision found.</td>
        </tr>
    </ng-template>
    <ng-template pTemplate="loadingbody">
        <tr>
            <td colspan="7">Loading revision data. Please wait.</td>
        </tr>
    </ng-template>
</p-table>
<ng-container *ngIf="showDiffDialog">
    <p-dialog header="Diff {{key}}" [(visible)]="showDiffDialog"
        [style]="{'min-with': '900px', 'min-height': '650px', width: '900px', height: '650px' }" [closeOnEscape]="true"
        [appendTo]="'body'" [focusOnShow]="false" [focusTrap]="false" [modal]="true" [responsive]="true"
        [maximizable]="true" [autoZIndex]="true" #dialog>
        <app-diff-text #diffText [dialog]="dialog" [left]="currentVersionItem" [right]="diffItem"></app-diff-text>
        <ng-template pTemplate="footer">
            <button *ngFor="let button of diffText.buttons" pButton aria-label="button" [class]="button.styleClass"
                [disabled]="button.disabled" type="button" [icon]="button.icon" (click)="button.command()"
                [label]="button.label"></button>
        </ng-template>
    </p-dialog>
</ng-container>
